version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres_db1:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: platemate_db1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_db1_data:/var/lib/postgresql/data
      - ./services/user-location-service/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres_db2:
    image: postgres:15-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: platemate_db2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_db2_data:/var/lib/postgresql/data
      - ./services/food-inventory-service/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres_db3:
    image: postgres:15-alpine
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: platemate_db3
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_db3_data:/var/lib/postgresql/data
      - ./services/claim-service/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres_db4:
    image: postgres:15-alpine
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: platemate_db4
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_db4_data:/var/lib/postgresql/data
      - ./services/reputation-service/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres_db5:
    image: postgres:15-alpine
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: platemate_db5
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_db5_data:/var/lib/postgresql/data
      - ./services/messaging-service/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  user-location-service:
    build:
      context: .
      dockerfile: ./services/user-location-service/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: postgres_db1
      DB_PORT: 5432
      DB_NAME: platemate_db1
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-secret}
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      postgres_db1:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  food-inventory-service:
    build:
      context: .
      dockerfile: ./services/food-inventory-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_HOST: postgres_db2
      DB_PORT: 5432
      DB_NAME: platemate_db2
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-secret}
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      postgres_db2:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  claim-service:
    build:
      context: .
      dockerfile: ./services/claim-service/Dockerfile
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DB_HOST: postgres_db3
      DB_PORT: 5432
      DB_NAME: platemate_db3
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-secret}
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      postgres_db3:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  reputation-service:
    build:
      context: .
      dockerfile: ./services/reputation-service/Dockerfile
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DB_HOST: postgres_db4
      DB_PORT: 5432
      DB_NAME: platemate_db4
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-secret}
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      postgres_db4:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  messaging-service:
    build:
      context: .
      dockerfile: ./services/messaging-service/Dockerfile
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      DB_HOST: postgres_db5
      DB_PORT: 5432
      DB_NAME: platemate_db5
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-secret}
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      postgres_db5:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_db1_data:
  postgres_db2_data:
  postgres_db3_data:
  postgres_db4_data:
  postgres_db5_data:
